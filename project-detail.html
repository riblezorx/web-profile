<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Detail - Hizkia Mikayla M.</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
      .detail-page{min-height:100vh;padding-top:100px;padding-bottom:80px}
      .back-btn{display:inline-flex;align-items:center;gap:8px;color:var(--text-muted);text-decoration:none;font-size:.9rem;font-weight:500;margin-bottom:40px;transition:color .3s}
      .back-btn:hover{color:var(--primary-red)}
      .detail-hero{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:start;margin-bottom:60px}
      .detail-left{position:sticky;top:100px}
      .detail-category-badge{display:inline-block;background:rgba(255,51,51,.12);color:var(--primary-red);border:1px solid rgba(255,51,51,.3);font-size:.78rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:5px 14px;border-radius:20px;margin-bottom:20px}
      .detail-title{font-size:2.6rem;font-weight:800;line-height:1.15;color:var(--text-main);margin-bottom:16px}
      .detail-title-line{width:52px;height:4px;background:var(--primary-red);border-radius:2px;margin-bottom:24px}
      .detail-desc{color:var(--text-muted);font-size:1rem;line-height:1.8;margin-bottom:32px}
      .detail-stats{display:flex;gap:16px;margin-bottom:32px;flex-wrap:wrap}
      .detail-stat-badge{display:flex;align-items:center;gap:12px;background:rgba(20,7,7,.6);border:1px solid var(--border-color);padding:14px 20px;border-radius:10px;flex:1;min-width:140px}
      .detail-stat-badge .stat-icon-sm{color:var(--primary-red);font-size:1.2rem}
      .detail-stat-badge .stat-info strong{display:block;font-size:1.4rem;font-weight:800;color:var(--text-main);line-height:1}
      .detail-stat-badge .stat-info span{font-size:.78rem;color:var(--text-muted)}
      .detail-actions{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:40px}
      .detail-tech-section{margin-bottom:10px}
      .detail-section-label{display:flex;align-items:center;gap:8px;font-size:.88rem;font-weight:700;color:var(--text-muted);letter-spacing:.5px;margin-bottom:14px}
      .detail-section-label i{color:var(--primary-red)}
      .tech-pill-list{display:flex;flex-wrap:wrap;gap:10px}
      .tech-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(20,7,7,.7);border:1px solid var(--border-color);color:var(--text-main);font-size:.83rem;font-weight:600;padding:7px 16px;border-radius:8px;transition:border-color .3s,color .3s}
      .tech-pill i{color:var(--primary-red);font-size:.95rem}
      .tech-pill:hover{border-color:var(--primary-red);color:var(--primary-red)}
      .detail-right{display:flex;flex-direction:column;gap:20px}
      .detail-img-card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 20px 50px rgba(0,0,0,.5)}
      .detail-img-card-header{background:#f5f5f5;padding:10px 16px;display:flex;align-items:center;justify-content:center;border-bottom:1px solid #e0e0e0;gap:8px}
      .detail-img-card-header span{font-size:.78rem;color:#555;font-weight:600;letter-spacing:.5px}
      .detail-img-card-label{background:#1a1a2e;color:#fff;font-size:.72rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 14px;border-radius:4px}
      .detail-img-showcase{position:relative;background:var(--primary-red);padding:30px 30px 0 30px;min-height:280px;display:flex;align-items:flex-end;justify-content:center;gap:15px}
      .detail-img-showcase .img-desktop{width:75%;border-radius:8px 8px 0 0;box-shadow:0 -8px 30px rgba(0,0,0,.4);display:block}
      .detail-img-showcase .img-mobile{width:20%;border-radius:12px 12px 0 0;box-shadow:0 -8px 30px rgba(0,0,0,.4);display:block;align-self:flex-end;margin-bottom:0}
      .detail-features-card{background:rgba(20,7,7,.6);border:1px solid var(--border-color);border-radius:14px;padding:28px 30px;backdrop-filter:blur(10px)}
      .detail-features-title{display:flex;align-items:center;gap:10px;font-size:1.05rem;font-weight:700;color:var(--text-main);margin-bottom:20px}
      .detail-features-title i{color:#f0c040}
      .features-list{list-style:none;display:flex;flex-direction:column;gap:12px}
      .features-list li{display:flex;align-items:flex-start;gap:12px;color:var(--text-muted);font-size:.93rem;line-height:1.5}
      .features-list li::before{content:'';width:8px;height:8px;background:var(--primary-red);border-radius:50%;flex-shrink:0;margin-top:6px}
      .detail-loading{text-align:center;padding:80px 0;color:var(--text-muted)}
      .detail-loading i{font-size:2.5rem;margin-bottom:16px;display:block}
      @media(max-width:900px){.detail-hero{grid-template-columns:1fr;gap:40px}.detail-left{position:static}.detail-title{font-size:2rem}}
      @media(max-width:600px){.detail-title{font-size:1.6rem}.detail-img-showcase .img-desktop{width:70%}.detail-img-showcase .img-mobile{width:22%}}
    </style>
  </head>
  <body>
    <script>
    const SUPA_URL='https://qzlznykmliloqvuwzznw.supabase.co';
    const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF6bHpueWttbGlsb3F2dXd6em53Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMTU5MTAsImV4cCI6MjA5MjU5MTkxMH0.xZNDJcgw1DFXou_crncanXcDbJdZwR477ITdftYViSk';
    async function sbGet(table,q=''){
      const r=await fetch(`${SUPA_URL}/rest/v1/${table}?${q}`,{headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}});
      return r.json();
    }
    </script>

    <nav id="navbar">
      <a href="index.html" class="logo">Hizkia Mikayla M.</a>
      <ul class="nav-links">
        <li><a href="index.html#home">Home</a></li>
        <li><a href="index.html#about">About</a></li>
        <li><a href="index.html#portfolio" class="active">Portofolio</a></li>
        <li><a href="index.html#contact">Contact</a></li>
      </ul>
    </nav>

    <div class="detail-page">
      <div class="container">
        <a href="index.html#portfolio" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Kembali ke Portfolio</a>
        <div id="detail-content">
          <div class="detail-loading"><i class="fa-solid fa-spinner fa-spin"></i>Memuat detail project...</div>
        </div>
      </div>
    </div>

    <script>
    function renderDetail(p) {
      if (!p) {
        document.getElementById('detail-content').innerHTML =
          '<div class="detail-loading"><i class="fa-solid fa-circle-exclamation" style="color:var(--primary-red)"></i><h2 style="color:var(--text-main)">Project tidak ditemukan</h2><a href="index.html#portfolio" class="btn btn-primary" style="display:inline-flex;margin-top:24px"><i class="fa-solid fa-arrow-left"></i> Kembali</a></div>';
        return;
      }
      document.title = p.title + ' — Hizkia Mikayla M.';

      // Parse technologies & features (disimpan sebagai JSON string di Supabase)
      var techs = [], features = [];
      try { techs = JSON.parse(p.technologies || '[]'); } catch { techs = (p.technologies||'').split(',').map(function(t){return{name:t.trim(),icon:'fa-solid fa-code'};}); }
      try { features = JSON.parse(p.features || '[]'); } catch { features = (p.features||'').split('\n').filter(Boolean); }

      var techHTML = techs.map(function(t){return '<span class="tech-pill"><i class="'+t.icon+'"></i>'+t.name+'</span>';}).join('');
      var featHTML = features.map(function(f){return '<li>'+(typeof f==='object'?f.name||f:f)+'</li>';}).join('');
      var ghBtn = p.github_url ? '<a href="'+p.github_url+'" target="_blank" class="btn btn-outline"><i class="fa-brands fa-github"></i> Github</a>' : '';
      var liveBadge = p.is_live
        ? '<span style="background:#27c93f;color:#fff;font-size:.72rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 12px;border-radius:20px;">LIVE NOW!</span>'
        : '<span style="background:#555;color:#fff;font-size:.72rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 12px;border-radius:20px;">IN PROGRESS</span>';

      document.getElementById('detail-content').innerHTML =
        '<div class="detail-hero">'+
          '<div class="detail-left">'+
            '<span class="detail-category-badge">'+(p.category||'Project')+'</span>'+
            '<h1 class="detail-title">'+p.title+'</h1>'+
            '<div class="detail-title-line"></div>'+
            '<p class="detail-desc">'+(p.description||'')+'</p>'+
            '<div class="detail-stats">'+
              '<div class="detail-stat-badge"><span class="stat-icon-sm"><i class="fa-solid fa-code"></i></span><div class="stat-info"><strong>'+(p.total_tech||0)+'</strong><span>Total Teknologi</span></div></div>'+
              '<div class="detail-stat-badge"><span class="stat-icon-sm"><i class="fa-solid fa-layer-group"></i></span><div class="stat-info"><strong>'+(p.total_feature||0)+'</strong><span>Fitur Utama</span></div></div>'+
            '</div>'+
            '<div class="detail-actions">'+
              '<a href="'+(p.live_url||'#')+'" target="_blank" class="btn btn-outline"><i class="fa-solid fa-arrow-up-right-from-square"></i> Live Demo</a>'+ghBtn+
            '</div>'+
            '<div class="detail-tech-section"><div class="detail-section-label"><i class="fa-solid fa-code"></i><span>Technologies Used</span></div><div class="tech-pill-list">'+techHTML+'</div></div>'+
          '</div>'+
          '<div class="detail-right">'+
            '<div class="detail-img-card">'+
              '<div class="detail-img-card-header"><span>'+(p.site_label||'portfolio')+'</span>'+liveBadge+'<span class="detail-img-card-label">PROJECT PORTFOLIO</span></div>'+
              '<div class="detail-img-showcase">'+
                '<img class="img-desktop" src="'+(p.img_desktop_url||'https://via.placeholder.com/600x380/1a0a0a/ff3333?text=Preview')+'" alt="Desktop preview" />'+
                '<img class="img-mobile" src="'+(p.img_mobile_url||'https://via.placeholder.com/180x320/1a0a0a/ff3333?text=Mobile')+'" alt="Mobile preview" />'+
              '</div>'+
            '</div>'+
            '<div class="detail-features-card">'+
              '<div class="detail-features-title"><i class="fa-regular fa-star"></i><span>Key Features</span></div>'+
              '<ul class="features-list">'+featHTML+'</ul>'+
            '</div>'+
          '</div>'+
        '</div>';
    }

    document.addEventListener('DOMContentLoaded', async function() {
      var id = new URLSearchParams(window.location.search).get('id');
      if (!id) { renderDetail(null); return; }
      try {
        var data = await sbGet('projects', 'id=eq.'+id);
        renderDetail(data && data[0] ? data[0] : null);
      } catch(e) { renderDetail(null); }
    });
    </script>
    <script src="script.js"></script>
  </body>
</html>
